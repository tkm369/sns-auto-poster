name: TikTok PDCA

on:
  schedule:
    - cron: '0 16 * * *'  # 毎日 01:00 JST
  workflow_dispatch:

jobs:
  pdca:
    runs-on: self-hosted
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Reset workspace
        run: |
          git rebase --abort 2>/dev/null
          if exist .gitebase-merge rmdir /s /q .gitebase-merge 2>/dev/null
          if exist .gitebase-apply rmdir /s /q .gitebase-apply 2>/dev/null
          git reset --hard HEAD 2>/dev/null
          git clean -fd 2>/dev/null
          exit 0
        shell: cmd

      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch TikTok session from Chrome
        run: |
          for /f "delims=" %%i in ('C:\qwen3tts-jp\Qwen3-TTS-JP\.venv\Scripts\python.exe tiktok_auto\get_session.py') do set SID=%%i
          if "%SID%"=="NOT_FOUND" (echo [WARNING] sessionid not found) else if "%SID%"=="DECRYPT_FAIL" (echo [WARNING] decrypt failed) else (echo TIKTOK_SESSION_ID=%SID%>> %GITHUB_ENV%)
        shell: cmd

      - name: Collect metrics from TikTok Studio
        run: |
          cd tiktok_auto
          C:\qwen3tts-jp\Qwen3-TTS-JP\.venv\Scripts\python.exe analytics_collector.py
        shell: cmd

      - name: Analyze and update strategy
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd tiktok_auto
          C:\qwen3tts-jp\Qwen3-TTS-JP\.venv\Scripts\python.exe pdca_analyzer.py
        shell: cmd

      - name: Commit PDCA results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tiktok_auto/posts_log.json tiktok_auto/strategy.json
          git diff --staged --quiet || git commit -m "chore: PDCA更新 [skip ci]"
          git fetch origin
          if exist .gitebase-merge rmdir /s /q .gitebase-merge 2>/dev/null
          git rebase origin/master
          git push
        shell: cmd
