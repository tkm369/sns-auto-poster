name: TikTok PDCA

on:
  schedule:
    - cron: '0 16 * * *'  # 毎日 01:00 JST
  workflow_dispatch:

jobs:
  pdca:
    runs-on: self-hosted
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Reset workspace
        run: |
          git config --global --add safe.directory C:/actions-runner/_work/ai-project/ai-project
          git rebase --abort 2>nul
          if exist .git\rebase-merge rmdir /s /q .git\rebase-merge 2>nul
          if exist .git\rebase-apply rmdir /s /q .git\rebase-apply 2>nul
          git reset --hard HEAD 2>nul
          git clean -fd 2>nul
          exit 0
        shell: cmd

      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch TikTok session from file
        run: |
          set /p SID=<C:\actions-runner\tiktok_session.txt
          if "%SID%"=="" (echo [WARNING] session file empty) else (echo TIKTOK_SESSION_ID=%SID%>> %GITHUB_ENV%)
        shell: cmd

      - name: Ensure Playwright Chromium installed
        run: |
          C:\qwen3tts-jp\Qwen3-TTS-JP\.venv\Scripts\playwright.exe install chromium 2>nul || echo playwright install skipped
        shell: cmd

      - name: Collect metrics from TikTok Studio
        run: |
          cd tiktok_auto
          C:\qwen3tts-jp\Qwen3-TTS-JP\.venv\Scripts\python.exe analytics_collector.py
        shell: cmd

      - name: Analyze and update strategy (category weights)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          cd tiktok_auto
          C:\qwen3tts-jp\Qwen3-TTS-JP\.venv\Scripts\python.exe pdca_analyzer.py
        shell: cmd

      - name: Optimize config (hashtags / duration / style)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd tiktok_auto
          C:\qwen3tts-jp\Qwen3-TTS-JP\.venv\Scripts\python.exe strategy_optimizer.py
        shell: cmd

      - name: Commit PDCA results
        run: |
          git config --global --add safe.directory C:/actions-runner/_work/ai-project/ai-project
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tiktok_auto/posts_log.json tiktok_auto/strategy.json tiktok_auto/config.py tiktok_auto/pdca_report.json tiktok_auto/account_analytics.json 2>nul
          git diff --staged --quiet || git commit -m "chore: PDCA更新 [skip ci]"
          git fetch origin
          if exist .git\rebase-merge rmdir /s /q .git\rebase-merge 2>nul
          git rebase origin/master
          git push
        shell: cmd
