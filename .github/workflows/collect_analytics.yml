name: Collect Analytics

permissions:
  contents: write

"on":
  schedule:
    - cron: '0 3,15 * * *'  # 1日2回（JST 12:00・翌0:00）Geminiクォータ節約
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリをインストール
        run: pip install -r sns_auto_poster/requirements.txt

      - name: 実績データを収集
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: cd sns_auto_poster && python collect_analytics.py

      - name: Threadsトークンを自動更新（期限30日以内の場合）
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd sns_auto_poster && python refresh_tokens.py

      - name: トレンドキーワードを取得
        run: cd sns_auto_poster && python -c "from trends import fetch_and_save_trends; fetch_and_save_trends()"

      - name: 競合アカウントの自動管理（発見・追跡・削除・学習データ更新）
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: cd sns_auto_poster && python -c "from competitor_tracker import run; run()"

      - name: 競合画像のスタイル分析（Gemini Vision）
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd sns_auto_poster && python -c "
import json
from style_analyzer import run as analyze_styles
stats = json.load(open('account_stats.json', encoding='utf-8'))
analyze_styles(stats.get('accounts', {}))
"

      - name: 実績ログ・トレンド・ハッシュタグ統計をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sns_auto_poster/posts_log.json sns_auto_poster/trends_cache.json sns_auto_poster/hashtag_stats.json sns_auto_poster/reference_posts.json sns_auto_poster/account_stats.json sns_auto_poster/style_guide.json
          git diff --staged --quiet || git commit -m "chore: 実績データ・トレンド・競合学習データ更新 [skip ci]"
          git pull --rebase origin master
          git push
