name: TikTok Auto Post

on:
  schedule:
    - cron: '0 22 * * *'  # 毎日 07:00 JST
    - cron: '0 3 * * *'   # 毎日 12:00 JST
    - cron: '0 6 * * *'   # 毎日 15:00 JST
    - cron: '0 9 * * *'   # 毎日 18:00 JST
    - cron: '0 12 * * *'  # 毎日 21:00 JST
    - cron: '0 14 * * *'  # 毎日 23:00 JST
  workflow_dispatch:       # 手動実行ボタン

jobs:
  post:
    runs-on: self-hosted   # 自分のPCで実行（住宅IP）
    timeout-minutes: 20    # 20分でジョブ全体を強制終了
    permissions:
      contents: write

    steps:
      # ---- ワークスペースのリセット（前回の競合を解消）-----------
      - name: Reset workspace
        run: |
          git reset --hard HEAD 2>nul || true
          git clean -fd 2>nul || true
        shell: cmd

      # ---- リポジトリをチェックアウト ----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ---- 依存ライブラリをインストール --------------------------
      - name: Install dependencies
        run: |
          C:\qwen3tts-jp\Qwen3-TTS-JP\.venv\Scripts\pip.exe install -r tiktok_auto/requirements.txt
          C:\qwen3tts-jp\Qwen3-TTS-JP\.venv\Scripts\python.exe -m playwright install chromium
        shell: cmd

      # ---- 新着取得 → 動画生成 → TikTok投稿 -------------------
      - name: Run post job
        env:
          TIKTOK_SESSION_ID:      ${{ secrets.TIKTOK_SESSION_ID }}
          X_API_KEY:              ${{ secrets.X_API_KEY }}
          X_API_SECRET:           ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:         ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET:  ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          THREADS_ACCESS_TOKEN:   ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:        ${{ secrets.THREADS_USER_ID }}
          TIKTOK_EXTRA_COOKIES:   ${{ secrets.TIKTOK_EXTRA_COOKIES }}
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd tiktok_auto
          C:\qwen3tts-jp\Qwen3-TTS-JP\.venv\Scripts\python.exe post_job.py
        shell: cmd

      # ---- queue.json / seen_ids.json をコミット ---------------
      - name: Commit state update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tiktok_auto/queue.json tiktok_auto/seen_ids.json tiktok_auto/hashtag_index.json tiktok_auto/posts_log.json
          git diff --staged --quiet || git commit -m "chore: auto queue update [skip ci]"
          git pull --rebase
          git push
        shell: cmd
