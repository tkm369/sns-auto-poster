name: TikTok Auto Post

on:
  schedule:
    - cron: '0 22 * * *'  # 毎日 07:00 JST
    - cron: '0 3 * * *'   # 毎日 12:00 JST
    - cron: '0 6 * * *'   # 毎日 15:00 JST
    - cron: '0 9 * * *'   # 毎日 18:00 JST
    - cron: '0 12 * * *'  # 毎日 21:00 JST
    - cron: '0 14 * * *'  # 毎日 23:00 JST
  workflow_dispatch:       # 手動実行ボタン

jobs:
  post:
    runs-on: self-hosted   # 自分のPCで実行（住宅IP）
    timeout-minutes: 20    # 20分でジョブ全体を強制終了
    permissions:
      contents: write

    steps:
      # ---- ワークスペースのリセット（前回の競合を解消）-----------
      - name: Reset workspace
        run: |
          git reset --hard HEAD 2>nul
          git clean -fd 2>nul
          exit 0
        shell: cmd

      # ---- リポジトリをチェックアウト ----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ---- ChromeからTikTokセッションIDを自動取得 ---------------
      - name: Fetch TikTok session from Chrome
        run: |
          for /f "delims=" %%i in ('C:\qwen3tts-jp\Qwen3-TTS-JP\.venv\Scripts\python.exe tiktok_auto\get_session.py') do set SID=%%i
          if "%SID%"=="NOT_FOUND" (echo [WARNING] sessionid not found in Chrome) else if "%SID%"=="DECRYPT_FAIL" (echo [WARNING] sessionid decrypt failed) else (echo TIKTOK_SESSION_ID=%SID%>> %GITHUB_ENV%)
        shell: cmd

      # ---- 新着取得 → 動画生成 → TikTok投稿 -------------------
      - name: Run post job
        env:
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd tiktok_auto
          C:\qwen3tts-jp\Qwen3-TTS-JP\.venv\Scripts\python.exe post_job.py
        shell: cmd

      # ---- queue.json / seen_ids.json をコミット ---------------
      - name: Commit state update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tiktok_auto/queue.json tiktok_auto/seen_ids.json tiktok_auto/hashtag_index.json tiktok_auto/posts_log.json
          git diff --staged --quiet || git commit -m "chore: auto queue update [skip ci]"
          git pull --rebase
          git push
        shell: cmd
