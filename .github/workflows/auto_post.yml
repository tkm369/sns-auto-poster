name: SNS Auto Post

permissions:
  contents: write

"on":
  schedule:
    - cron: '0 22 * * *'   # UTC 22:00 = JST 07:00 (早朝投稿)
    - cron: '0 0 * * *'    # UTC 00:00 = JST 09:00 (朝投稿)
    - cron: '0 3 * * *'    # UTC 03:00 = JST 12:00 (昼投稿)
    - cron: '0 6 * * *'    # UTC 06:00 = JST 15:00 (午後投稿)
    - cron: '0 9 * * *'    # UTC 09:00 = JST 18:00 (夕方投稿)
    - cron: '0 12 * * *'   # UTC 12:00 = JST 21:00 (夜投稿)
  workflow_dispatch:        # GitHub上から手動実行も可能

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリをインストール
        run: pip install -r sns_auto_poster/requirements.txt

      - name: 自動投稿を実行
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          AFFILIATE_LINK: ${{ secrets.AFFILIATE_LINK }}
        run: cd sns_auto_poster && python main.py

      - name: 投稿ログをコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sns_auto_poster/posts_log.json
          git diff --staged --quiet || git commit -m "chore: 投稿ログ更新 [skip ci]"
          git push
