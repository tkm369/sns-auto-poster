name: SNS Auto Post

permissions:
  contents: write

"on":
  # schedule:
  #   - cron: '0 */2 * * *'  # 一時停止中（アカウント制限解除待ち）
  workflow_dispatch:        # GitHub上から手動実行も可能

concurrency:
  group: sns-auto-post
  cancel-in-progress: false   # 実行中のものは完了させ、次のRunはキューで待機

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: ランダム遅延（Bot判定回避：0〜5分のランダム待機）
        run: sleep $((RANDOM % 300))

      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 日本語フォントをインストール
        run: sudo apt-get install -y fonts-noto-cjk

      - name: 依存ライブラリをインストール
        run: pip install -r sns_auto_poster/requirements.txt

      - name: 最新ログを取得（interval check用）
        run: git pull --rebase origin master || true

      - name: 投稿コンテンツ・画像を生成
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AFFILIATE_LINK: ${{ secrets.AFFILIATE_LINK }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: cd sns_auto_poster && python main.py --mode=generate

      - name: 生成画像・pending_post をコミット（投稿前にURLを確定させる）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sns_auto_poster/generated_images/ sns_auto_poster/pending_post.json
          git diff --staged --quiet || git commit -m "chore: auto queue update [skip ci]"
          git pull --rebase origin master
          git push

      - name: 投稿を実行
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          AFFILIATE_LINK: ${{ secrets.AFFILIATE_LINK }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: cd sns_auto_poster && python main.py --mode=post

      - name: 投稿ログをコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sns_auto_poster/posts_log.json
          git diff --staged --quiet || git commit -m "chore: 投稿ログ更新 [skip ci]"
          git stash || true
          git pull --rebase origin master
          git stash pop || true
          git push
